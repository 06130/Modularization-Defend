<body>
    <div id="root">
        <div id="header">
            <div id="header-icon">&#9636;</div>
            <div id="header-title">作战控制台</div>
            <div id="header-subtitle">COMBAT CONSOLE</div>
        </div>

        <div id="divider"></div>

        <div id="tick-section">
            <div class="section-label">TICK 计数</div>
            <div id="tick-value">0</div>
            <div id="tick-sub">ticks</div>
        </div>

        <div id="time-section">
            <div class="section-label">运行时长</div>
            <div id="time-grid">
                <div class="time-cell">
                    <div class="time-value" id="val-days">0</div>
                    <div class="time-unit">日</div>
                </div>
                <div class="time-sep">:</div>
                <div class="time-cell">
                    <div class="time-value" id="val-hours">00</div>
                    <div class="time-unit">时</div>
                </div>
                <div class="time-sep">:</div>
                <div class="time-cell">
                    <div class="time-value" id="val-minutes">00</div>
                    <div class="time-unit">分</div>
                </div>
                <div class="time-sep">:</div>
                <div class="time-cell">
                    <div class="time-value" id="val-seconds">00</div>
                    <div class="time-unit">秒</div>
                </div>
            </div>
        </div>

        <div id="progress-section">
            <div class="section-label">当日进度</div>
            <div id="day-bar-bg">
                <div id="day-bar-fill"></div>
            </div>
            <div id="day-bar-text">0 / 24000</div>
        </div>

        <div id="status-section">
            <div class="section-label">状态</div>
            <div id="status-grid">
                <div class="status-row">
                    <span class="status-key">Tick Rate</span>
                    <span class="status-val" id="val-tps">20.0 TPS</span>
                </div>
                <div class="status-row">
                    <span class="status-key">总 Tick</span>
                    <span class="status-val" id="val-total">0</span>
                </div>
            </div>
        </div>
    </div>
</body>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-family: 'Segoe UI', sans-serif;
        background: transparent;
    }

    #root {
        display: flex;
        flex-direction: column;
        width: 260px;
        padding: 18px;
        background: linear-gradient(180deg, rgba(14, 14, 24, 0.97), rgba(10, 10, 18, 0.97));
        border: 1px solid rgba(0, 180, 220, 0.25);
        box-shadow: 0 0 20px rgba(0, 140, 200, 0.08), inset 0 0 60px rgba(0, 0, 0, 0.3);
    }

    #header {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    #header-icon {
        font-size: 24px;
        color: rgba(0, 200, 255, 0.6);
        margin-bottom: 4px;
        letter-spacing: 4px;
    }

    #header-title {
        font-size: 16px;
        font-weight: bold;
        color: #00c8ff;
        letter-spacing: 4px;
        text-shadow: 0 0 8px rgba(0, 180, 255, 0.3);
    }

    #header-subtitle {
        font-size: 8px;
        color: rgba(0, 200, 255, 0.3);
        letter-spacing: 3px;
        margin-top: 2px;
    }

    #divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0, 180, 220, 0.3), transparent);
        margin: 12px 0;
    }

    .section-label {
        font-size: 9px;
        font-weight: bold;
        color: rgba(0, 200, 255, 0.4);
        letter-spacing: 2px;
        margin-bottom: 6px;
        text-align: center;
    }

    #tick-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 14px;
    }

    #tick-value {
        font-size: 36px;
        font-weight: bold;
        color: #00e0ff;
        font-family: 'Consolas', 'Courier New', monospace;
        text-shadow: 0 0 12px rgba(0, 200, 255, 0.4);
        line-height: 1;
    }

    #tick-sub {
        font-size: 9px;
        color: rgba(170, 200, 216, 0.5);
        letter-spacing: 2px;
        margin-top: 2px;
    }

    #time-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 14px;
    }

    #time-grid {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 4px;
    }

    .time-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 36px;
    }

    .time-value {
        font-size: 18px;
        font-weight: bold;
        color: #d0e8f0;
        font-family: 'Consolas', 'Courier New', monospace;
    }

    .time-unit {
        font-size: 7px;
        color: rgba(170, 200, 216, 0.4);
        letter-spacing: 1px;
    }

    .time-sep {
        font-size: 18px;
        color: rgba(170, 200, 216, 0.25);
        font-weight: bold;
    }

    #progress-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 14px;
    }

    #day-bar-bg {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
    }

    #day-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #003050, #0080c0, #00d0ff);
        transition: width 0.5s ease;
    }

    #day-bar-text {
        font-size: 8px;
        color: rgba(170, 200, 216, 0.4);
        margin-top: 3px;
        text-align: right;
        width: 100%;
    }

    #status-section {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    #status-grid {
        width: 100%;
    }

    .status-row {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .status-key {
        font-size: 9px;
        color: rgba(170, 200, 216, 0.55);
        letter-spacing: 0.5px;
    }

    .status-val {
        font-size: 9px;
        color: #00c8ff;
        font-weight: bold;
        font-family: 'Consolas', 'Courier New', monospace;
    }
</style>
<script>
    document.addEventListener('load', function () {
        console.log('[AUI] CombatConsole UI loaded');
    });

    function formatNumber(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return String(n);
    }

    function pad(num, size) {
        var s = String(num);
        while (s.length < (size || 2)) s = '0' + s;
        return s;
    }

    function setText(id, text) {
        var el = document.getElementById(id);
        if (el) el.innerText = String(text);
    }

    window.combatConsole = {
        /**
         * 更新作战控制台全部数据
         * @param {Object} data - {tickCount, elapsedSeconds, elapsedMinutes, elapsedHours,
         *                         dayTime, elapsedDays, tps}
         */
        updateAll: function(data) {
            // Tick 大数字
            setText('tick-value', formatNumber(data.tickCount));

            // 运行时长
            var totalSec = data.elapsedSeconds || 0;
            setText('val-days', data.elapsedDays || 0);
            setText('val-hours', pad(Math.floor((totalSec % 86400) / 3600)));
            setText('val-minutes', pad(Math.floor((totalSec % 3600) / 60)));
            setText('val-seconds', pad(totalSec % 60));

            // 当日进度条
            var dayTime = data.dayTime || 0;
            var pct = Math.round((dayTime / 24000) * 100);
            var fill = document.getElementById('day-bar-fill');
            if (fill) fill.style.width = pct + '%';
            setText('day-bar-text', formatNumber(dayTime) + ' / 24000');

            // 状态
            setText('val-tps', (data.tps || 20.0).toFixed(1) + ' TPS');
            setText('val-total', formatNumber(data.tickCount));
        }
    };
</script>
