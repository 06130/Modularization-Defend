<!DOCTYPE html>
<html>
<head>
    <title>Defend Core</title>
    <link rel="stylesheet" href="modularization_defend:defend_core/style.css"/>
</head>
<body>
    <div id="root">
        <!-- 标题 -->
        <div id="header">
            <div id="header-title">Defend Core</div>
            <div id="header-subtitle">Modularization Defend</div>
        </div>

        <!-- 分隔线 -->
        <div id="divider"></div>

        <!-- 能量信息 -->
        <div id="energy-section">
            <div class="section-label">Energy</div>
            <div id="energy-bar-bg">
                <div id="energy-bar-fill"></div>
            </div>
            <div id="energy-text">0 / 0 FE</div>
        </div>

        <!-- 状态面板 -->
        <div id="status-section">
            <div class="section-label">Status</div>
            <div id="status-list">
                <div class="status-row">
                    <span class="status-key">Harm Level</span>
                    <span class="status-val" id="val-harm">0</span>
                </div>
                <div class="status-row">
                    <span class="status-key">Energy Efficiency</span>
                    <span class="status-val" id="val-efficiency">0</span>
                </div>
                <div class="status-row">
                    <span class="status-key">Shield</span>
                    <span class="status-val" id="val-shield">Inactive</span>
                </div>
                <div class="status-row">
                    <span class="status-key">Fortress Core</span>
                    <span class="status-val" id="val-core">None</span>
                </div>
            </div>
        </div>

        <!-- 升级等级 -->
        <div id="upgrades-section">
            <div class="section-label">Upgrades</div>
            <div id="upgrades-grid">
                <div class="upgrade-item">
                    <div class="upgrade-name">Speed</div>
                    <div class="upgrade-bar-bg"><div class="upgrade-bar-fill" id="upg-speed"></div></div>
                    <div class="upgrade-val" id="upg-speed-val">0/4</div>
                </div>
                <div class="upgrade-item">
                    <div class="upgrade-name">Energy</div>
                    <div class="upgrade-bar-bg"><div class="upgrade-bar-fill" id="upg-energy"></div></div>
                    <div class="upgrade-val" id="upg-energy-val">0/4</div>
                </div>
                <div class="upgrade-item">
                    <div class="upgrade-name">Efficiency</div>
                    <div class="upgrade-bar-bg"><div class="upgrade-bar-fill" id="upg-efficiency"></div></div>
                    <div class="upgrade-val" id="upg-efficiency-val">0/4</div>
                </div>
                <div class="upgrade-item">
                    <div class="upgrade-name">Capacity</div>
                    <div class="upgrade-bar-bg"><div class="upgrade-bar-fill" id="upg-capacity"></div></div>
                    <div class="upgrade-val" id="upg-capacity-val">0/4</div>
                </div>
                <div class="upgrade-item">
                    <div class="upgrade-name">Security</div>
                    <div class="upgrade-bar-bg"><div class="upgrade-bar-fill" id="upg-security"></div></div>
                    <div class="upgrade-val" id="upg-security-val">0/4</div>
                </div>
            </div>
        </div>

        <!-- 关闭按钮 -->
        <div id="close-btn" class="btn">Close</div>
    </div>

    <script src="modularization_defend:defend_core/script.js"></script>
</body>
</html>
